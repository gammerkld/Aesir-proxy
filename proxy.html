<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Æsir Proxy Browser</title>
  <link rel="icon" type="image/png" href="https://github.com/user-attachments/assets/3bfc41d6-94e4-4492-8949-89566bf96e78">
  <link rel="apple-touch-icon" href="https://github.com/user-attachments/assets/3bfc41d6-94e4-4492-8949-89566bf96e78">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" aria-label="Go to home page">
      <img class="logo" src="https://github.com/user-attachments/assets/3bfc41d6-94e4-4492-8949-89566bf96e78" alt="Æsir Logo">
    </a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="#" class="active">Proxy</a>
    </div>
  </nav>

  <main class="browser-shell">
    <form id="proxy-address-form" class="browser-bar" autocomplete="off">
      <input id="proxy-address-input" class="blue-focus-input" type="text" placeholder="Enter a URL (example.com or https://example.com)">
      <button class="browser-go" type="submit">Go</button>
    </form>
    <p id="proxy-status" class="proxy-status">Scramjet redirect ready.</p>
    <p class="proxy-helper">This page sends your query through the Scramjet route instead of using an iframe.</p>
  </main>

  <script src="/service/scramjet/scramjet.all.js"></script>
  <script src="scramjet-client.js"></script>
  <script src="proxy.js"></script>
</body>
</html>
