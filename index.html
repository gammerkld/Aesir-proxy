<!-- Soobin Easter Egg Video -->
<div id="soobinOverlay" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
  z-index:10000;
">
  <video id="soobinVideo" src="extra/google.mp4" style="max-width:80%; max-height:80%;" controls muted></video>
</div>

<script>
let typed = '';
const keyword = 'soobin';
const overlay = document.getElementById('soobinOverlay');
const video = document.getElementById('soobinVideo');

document.addEventListener('keydown', (e) => {
  typed += e.key.toLowerCase();

  if (typed.length > keyword.length) {
    typed = typed.slice(typed.length - keyword.length);
  }

  if (typed === keyword) {
    overlay.style.display = 'flex';
    video.currentTime = 0; // restart video
    video.muted = true;    // mute for autoplay

    // Try to play, then unmute after it starts
    video.play().then(() => {
      video.muted = false;
    }).catch(err => {
      console.log("Playback blocked:", err);
    });
  }
});

// Close overlay on clicking background
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) {
    overlay.style.display = 'none';
    video.pause();
  }
});

// Close overlay on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && overlay.style.display === 'flex') {
    overlay.style.display = 'none';
    video.pause();
  }
});
</script>

  <script>
    function inFrame() {
      try {
        return window.self !== window.top;
      } catch (e) {
        return true;
      }
    }

    const beforeUnloadHandler = function (e) {
      e.preventDefault();
      e.returnValue = 'Are you sure you want to leave?';
    };

    function addBeforeUnloadProtection() {
      window.addEventListener('beforeunload', beforeUnloadHandler);

      if (inFrame() !== false) {
        try {
          if (window.top && window.top !== window) {
            window.top.addEventListener('beforeunload', beforeUnloadHandler);
          }
        } catch (e) {
          // Ignore cross-origin frame access errors and keep local protection active.
        }
      }
    }

    addBeforeUnloadProtection();
  </script>
